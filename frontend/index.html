<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka Live Crypto Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0B0E14',
                        darkpanel: '#151924',
                        accent: '#2962FF',
                        buyGreen: '#00C853',
                        sellRed: '#D50000'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="bg-darkbg text-gray-200 h-screen flex flex-col font-sans overflow-hidden">
    <!-- Header -->
    <header class="bg-darkpanel border-b border-gray-800 p-4 flex justify-between items-center shadow-md z-10">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-wider text-white">SYSTEM<span class="text-accent">X</span> TERMINAL</h1>
            <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-400">Kafka Stream Real-Time</span>
        </div>
        <div class="text-sm font-mono text-gray-400" id="connection-status">
            Connecting to WebSocket...
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 flex p-4 gap-4 overflow-hidden">
        
        <!-- Left Panel: Live Trades Feed -->
        <div class="w-1/4 bg-darkpanel rounded-lg border border-gray-800 flex flex-col shadow-lg">
            <div class="p-3 border-b border-gray-800 font-bold text-sm tracking-wide text-gray-300">
                LIVE ORDER STREAM (MULTI-CRYPTO)
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="trades-container">
                <!-- Trades will be prepended here -->
            </div>
        </div>

        <!-- Center Panel: Real-time Chart -->
        <div class="w-2/4 bg-darkpanel rounded-lg border border-gray-800 flex flex-col shadow-lg relative glow-box">
            <div class="p-3 border-b border-gray-800 flex justify-between items-center text-sm font-bold text-gray-300">
                <span>PRICE ACTION + SMA PIVOT</span>
                <span id="current-price" class="text-lg font-mono text-white">---</span>
            </div>
            <div class="flex-1" id="chart-container"></div>
        </div>

        <!-- Right Panel: Signals -->
        <div class="w-1/4 bg-darkpanel rounded-lg border border-gray-800 flex flex-col shadow-lg">
            <div class="p-3 border-b border-gray-800 font-bold text-sm tracking-wide text-gray-300">
                ALGO TRADING SIGNALS
            </div>
            <div class="flex-1 overflow-y-auto p-2 space-y-2" id="signals-container">
                <!-- Signals will be prepended here -->
                <div class="text-center text-gray-500 text-xs py-4 italic">Waiting for signal edge...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
